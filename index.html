<!DOCTYPE html>
<html>
<head>
    <title>Nepal — My Journey Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css"
        integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ=="
        crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"
        integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew=="
        crossorigin=""></script>

    <style>
        :root {
            /* Core palette */
            --bg:        #0b0809;
            --surface:   #110d0e;
            --card:      #1a1215;
            --card2:     #221719;
            --border:    #2e2024;
            --border2:   #3d2a2f;

            /* Accent trio */
            --gold:      #c9a84c;
            --gold2:     #e8c97a;
            --gold-dim:  #7a6130;
            --burgundy:  #8b1a2f;
            --burg-hi:   #b8223e;
            --burg-glow: rgba(139,26,47,0.35);
            --purple:    #6b3fa0;
            --purple-hi: #8b5fcf;
            --purple-dim:#3d2460;

            /* Text */
            --text:      #f0e8df;
            --text2:     #c4b8ae;
            --muted:     #6b5f58;

            /* Province colours — warm, rich */
            --p1: #c0392b;
            --p2: #27ae60;
            --p3: #2980b9;
            --p4: #5dade2;
            --p5: #82e0aa;
            --p6: #d4ac0d;
            --p7: #e67e22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* ── Decorative grain overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.025;
            pointer-events: none;
            z-index: 9998;
        }

        .app {
            display: grid;
            grid-template-rows: 66px 1fr;
            height: 100vh;
        }

        /* ─────────────── HEADER ─────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border2);
            z-index: 1000;
            flex-shrink: 0;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle burgundy shimmer behind header */
        header::before {
            content: '';
            position: absolute;
            left: -60px; top: -40px;
            width: 260px; height: 160px;
            background: radial-gradient(ellipse, rgba(139,26,47,0.22) 0%, transparent 70%);
            pointer-events: none;
        }

        .header-left {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-shrink: 0;
            position: relative;
        }

        .logo-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        .logo-title .mt-icon { margin-right: 4px; }

        .logo-sub {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.8rem;
            color: var(--gold);
            letter-spacing: 0.06em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 13px;
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: 100px;
        }

        .stat-pill .num {
            font-size: 1.05rem;
            font-weight: 700;
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
        }

        .stat-pill .lbl {
            font-size: 0.62rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* ── Progress bar ── */
        .prog-wrap {
            width: 120px;
            flex-shrink: 0;
        }

        .prog-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.62rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 5px;
        }

        .prog-track {
            height: 5px;
            background: var(--border2);
            border-radius: 3px;
            overflow: hidden;
        }

        .prog-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--burgundy), var(--purple-hi), var(--gold));
            border-radius: 3px;
            transition: width 0.5s cubic-bezier(.4,0,.2,1);
            width: 0%;
            box-shadow: 0 0 6px rgba(107,63,160,0.5);
        }

        /* ─────────────── MAIN GRID ─────────────── */
        .main {
            display: grid;
            grid-template-columns: 1fr 288px;
            overflow: hidden;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background: var(--bg) !important;
        }

        .leaflet-container {
            background: var(--bg) !important;
            font-family: 'Outfit', sans-serif !important;
        }

        .leaflet-tooltip {
            background: rgba(11,8,9,0.96) !important;
            border: 1px solid var(--border2) !important;
            color: var(--text) !important;
            border-radius: 6px !important;
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.75rem !important;
            padding: 5px 12px !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7) !important;
            pointer-events: none !important;
            font-weight: 500;
            white-space: nowrap;
        }
        .leaflet-tooltip::before { display: none !important; }

        /* ── Map controls ── */
        .map-controls {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 900;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .map-btn {
            background: rgba(17,13,14,0.92);
            border: 1px solid var(--border2);
            color: var(--text2);
            padding: 8px 14px;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.55);
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(6px);
        }

        .map-btn:hover {
            background: var(--card2);
            border-color: var(--gold-dim);
            color: var(--gold);
        }

        .map-btn.active {
            background: rgba(139,26,47,0.18);
            border-color: var(--burg-hi);
            color: var(--gold);
        }

        /* ─────────────── SIDEBAR ─────────────── */
        .sidebar {
            background: var(--surface);
            border-left: 1px solid var(--border2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Purple glow top-right corner */
        .sidebar::before {
            content: '';
            position: absolute;
            top: -20px; right: -20px;
            width: 120px; height: 120px;
            background: radial-gradient(ellipse, rgba(107,63,160,0.18) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .sidebar-top {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .sidebar-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.03em;
        }

        .sidebar-hint {
            font-size: 0.64rem;
            color: var(--muted);
            margin-top: 1px;
        }

        /* Province filter tabs */
        .prov-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px 12px 7px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .prov-tab {
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 0.63rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.18s;
            opacity: 0.45;
            color: var(--text);
            background: var(--card);
            -webkit-tap-highlight-color: transparent;
        }

        .prov-tab:hover { opacity: 0.8; }
        .prov-tab.active { opacity: 1; }

        .prov-tab[data-p="all"].active { border-color: var(--gold); color: var(--gold); }
        .prov-tab[data-p="1"] { color: var(--p1); } .prov-tab[data-p="1"].active { border-color: var(--p1); }
        .prov-tab[data-p="2"] { color: var(--p2); } .prov-tab[data-p="2"].active { border-color: var(--p2); }
        .prov-tab[data-p="3"] { color: var(--p3); } .prov-tab[data-p="3"].active { border-color: var(--p3); }
        .prov-tab[data-p="4"] { color: var(--p4); } .prov-tab[data-p="4"].active { border-color: var(--p4); }
        .prov-tab[data-p="5"] { color: var(--p5); } .prov-tab[data-p="5"].active { border-color: var(--p5); }
        .prov-tab[data-p="6"] { color: var(--p6); } .prov-tab[data-p="6"].active { border-color: var(--p6); }
        .prov-tab[data-p="7"] { color: var(--p7); } .prov-tab[data-p="7"].active { border-color: var(--p7); }

        /* District list */
        .district-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px 7px;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
            position: relative;
            z-index: 1;
        }

        .district-list::-webkit-scrollbar { width: 4px; }
        .district-list::-webkit-scrollbar-track { background: transparent; }
        .district-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        .prov-group-header {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 7px 4px;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
            color: var(--muted);
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 2;
        }

        .prov-group-header .gh-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .prov-group-header .gh-count { margin-left: auto; font-size: 0.6rem; opacity: 0.7; }

        .district-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 7px;
            margin-bottom: 1px;
            transition: background 0.12s;
            cursor: pointer;
            border-left: 2px solid transparent;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .district-item:hover { background: var(--card); }

        /* Unvisited dot */
        .district-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: all 0.25s;
        }
        .district-dot.unvisited { background: var(--muted); opacity: 0.3; }

        /* Visited dot — gold pulse */
        .district-dot.vis {
            background: var(--gold);
            box-shadow: 0 0 6px var(--gold), 0 0 14px rgba(201,168,76,0.4);
        }

        /* Unvisited district name */
        .district-name {
            font-size: 0.76rem;
            color: var(--text2);
            opacity: 0.55;
            flex: 1;
            transition: all 0.2s;
        }

        /* Visited item — the whole row transforms */
        .district-item.vis-item {
            background: linear-gradient(90deg, rgba(139,26,47,0.15) 0%, rgba(107,63,160,0.08) 100%);
            border-left-color: var(--burg-hi);
            border-radius: 0 7px 7px 0;
        }

        .district-item.vis-item:hover {
            background: linear-gradient(90deg, rgba(139,26,47,0.25) 0%, rgba(107,63,160,0.15) 100%);
        }

        .district-item.vis-item .district-name {
            opacity: 1;
            color: var(--gold2);
            font-weight: 500;
        }

        .district-check {
            font-size: 0.6rem;
            opacity: 0;
            transition: opacity 0.2s;
            color: var(--burg-hi);
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .district-item.vis-item .district-check { opacity: 1; }

        /* Visited badge shimmer on row */
        .district-item.vis-item::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 0 7px 7px 0;
            background: linear-gradient(90deg, transparent 60%, rgba(201,168,76,0.04) 100%);
            pointer-events: none;
        }

        @keyframes focusFlash {
            0%   { background: rgba(139,26,47,0.2); border-left-color: var(--burg-hi); }
            100% { background: transparent; border-left-color: transparent; }
        }
        .district-item.flash { animation: focusFlash 2s ease forwards; }

        /* ── Legend ── */
        .legend {
            padding: 9px 16px 13px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .legend-title {
            font-size: 0.58rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 7px;
        }

        .legend-rows { display: flex; flex-direction: column; gap: 5px; }
        .legend-row { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: var(--muted); }

        .sw { width: 18px; height: 9px; border-radius: 2px; flex-shrink: 0; }
        .sw.unvisited { background: var(--muted); opacity: 0.3; }
        .sw.visited-sw {
            background: linear-gradient(90deg, var(--burgundy), var(--purple));
            border: 1px solid var(--burg-hi);
            box-shadow: 0 0 6px var(--burg-glow);
        }

        /* ─────────────── TOAST ─────────────── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--card2);
            border: 1px solid var(--border2);
            border-top: 1px solid var(--burg-hi);
            border-radius: 10px;
            padding: 9px 18px;
            font-size: 0.78rem;
            color: var(--text);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px var(--burg-glow);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast .tn { color: var(--gold); font-weight: 600; }

        /* ─────────────── MOBILE ─────────────── */
        @media (max-width: 700px) {
            .app { grid-template-rows: 58px 1fr; }

            header { padding: 0 10px; gap: 7px; }
            .logo-sub { display: none; }
            .logo-title { font-size: 1.1rem; }
            .stat-pill { padding: 4px 9px; }
            .stat-pill .num { font-size: 0.9rem; }
            .stat-pill .lbl { display: none; }

            /* Keep progress bar visible on mobile */
            .prog-wrap {
                width: 80px;
                display: block !important;
            }

            .main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
            }

            #map {
                height: 100%;
                min-height: 0;
                /* Fix mobile drag — allow touch scrolling to map */
                touch-action: pan-x pan-y;
            }

            .sidebar {
                border-left: none;
                border-top: 2px solid var(--border2);
                max-height: 42vh;
                min-height: 160px;
            }

            .map-controls { top: 8px; left: 8px; gap: 5px; }
            .map-btn { font-size: 0.67rem; padding: 7px 10px; }
            .toast { bottom: calc(42vh + 10px); }
        }

        @media (max-width: 380px) {
            .prog-wrap { width: 65px; }
            .prog-labels span:first-child { display: none; }
        }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="header-left">
            <span class="logo-title"><span class="mt-icon">🏔</span>Nepal Journey</span>
            <span class="logo-sub">Visited Districts Explorer</span>
        </div>
        <div class="header-right">
            <div class="stat-pill">
                <span class="num" id="visited-count">0</span>
                <span class="lbl">Visited</span>
            </div>
            <div class="stat-pill">
                <span class="num">77</span>
                <span class="lbl">Districts</span>
            </div>
            <div class="prog-wrap">
                <div class="prog-labels">
                    <span>Progress</span>
                    <span id="pct-label">0%</span>
                </div>
                <div class="prog-track">
                    <div class="prog-fill" id="prog-fill"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="main">
        <div id="map"></div>

        <div class="map-controls">
            <button class="map-btn active" id="provinces-btn" onclick="goToProvinceView()">🗾 Show All Provinces</button>
            <button class="map-btn" id="districts-btn" onclick="showAllDistricts()">🗺 Show All Districts</button>
        </div>

        <div class="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-title">Districts</div>
                <div class="sidebar-hint">Click map or list to toggle visited</div>
            </div>

            <div class="prov-tabs" id="prov-tabs">
                <div class="prov-tab active" data-p="all" onclick="filterProvince('all')">All</div>
                <div class="prov-tab" data-p="1" onclick="filterProvince(1)">P1</div>
                <div class="prov-tab" data-p="2" onclick="filterProvince(2)">P2</div>
                <div class="prov-tab" data-p="3" onclick="filterProvince(3)">P3</div>
                <div class="prov-tab" data-p="4" onclick="filterProvince(4)">P4</div>
                <div class="prov-tab" data-p="5" onclick="filterProvince(5)">P5</div>
                <div class="prov-tab" data-p="6" onclick="filterProvince(6)">P6</div>
                <div class="prov-tab" data-p="7" onclick="filterProvince(7)">P7</div>
            </div>

            <div class="district-list" id="district-list">
                <div style="padding:24px 10px;color:var(--muted);font-size:0.76rem;text-align:center;line-height:1.8">
                    Click a province on the map<br>or use the buttons above
                </div>
            </div>

            <div class="legend">
                <div class="legend-title">Legend</div>
                <div class="legend-rows">
                    <div class="legend-row"><div class="sw unvisited"></div>Not yet visited</div>
                    <div class="legend-row"><div class="sw visited-sw"></div>Visited ✓</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="text/javascript" src="nepal-province.js"></script>
<script type="text/javascript" src="province1-district.js"></script>
<script type="text/javascript" src="province2-district.js"></script>
<script type="text/javascript" src="province3-district.js"></script>
<script type="text/javascript" src="province4-district.js"></script>
<script type="text/javascript" src="province5-district.js"></script>
<script type="text/javascript" src="province6-district.js"></script>
<script type="text/javascript" src="province7-district.js"></script>

<script>
const PROV_COLORS = {
    1:'#c0392b', 2:'#27ae60', 3:'#2980b9',
    4:'#5dade2', 5:'#82e0aa', 6:'#d4ac0d', 7:'#e67e22'
};
const PROV_NAMES = {
    1:'Koshi', 2:'Madhesh', 3:'Bagmati',
    4:'Gandaki', 5:'Lumbini', 6:'Karnali', 7:'Sudurpashchim'
};
const PROV_DATA = {
    1: () => province_1, 2: () => province_2, 3: () => province_3,
    4: () => province_4, 5: () => province_5, 6: () => province_6, 7: () => province_7
};

// ── Storage ──
const STORAGE_KEY = 'nepal_journey_v4';
function loadVisited() {
    try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
    catch { return new Set(); }
}
function saveVisited() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...visited])); }
let visited = loadVisited();

// ── State ──
let currentView = 'provinces';
let activeProvinceNum = null;
let activeFilter = 'all';
let currentDistrictEntries = [];

// ── Map init — enable dragging + touch on mobile ──
const map = L.map('map', {
    scrollWheelZoom: true,
    touchZoom: true,
    doubleClickZoom: false,
    zoomControl: true,
    dragging: true,
    tap: false,           // disables Leaflet's custom tap (interferes with native drag)
    tapTolerance: 10,
    inertia: true,
    inertiaDeceleration: 3000
}).setView([28.3949, 84.124], 7);
map.zoomControl.setPosition('topright');

// Ensure dragging is forced on after load (fixes some mobile Leaflet quirks)
map.whenReady(() => {
    if (!map.dragging.enabled()) map.dragging.enable();
});

const provinceLayerGroup = L.layerGroup().addTo(map);
const districtLayerGroup = L.layerGroup().addTo(map);

// ── Helpers ──
function dName(feature) {
    return (feature.properties.DISTRICT || feature.properties.district || '').trim();
}

function lighten(hex, amt) {
    const n = parseInt(hex.replace('#',''), 16);
    const r = Math.min(255, ((n >> 16) & 0xff) + Math.round(255 * amt));
    const g = Math.min(255, ((n >> 8)  & 0xff) + Math.round(255 * amt));
    const b = Math.min(255, (n         & 0xff)  + Math.round(255 * amt));
    return `rgb(${r},${g},${b})`;
}

function getProvNum(feature) {
    return feature.properties.Province || feature.properties.PROVINCE || feature.properties.province;
}

// ── District styling ──
function styleDistrict(feature, hovered) {
    const name   = dName(feature);
    const isV    = visited.has(name);
    const pNum   = getProvNum(feature);
    const base   = PROV_COLORS[pNum] || '#7fb3c8';

    if (isV) {
        return {
            weight:      hovered ? 2.5 : 1.2,
            color:       hovered ? '#e8c97a' : 'rgba(201,168,76,0.45)',
            fillColor:   hovered ? '#4a1535' : '#2d0f1a',
            fillOpacity: hovered ? 0.97 : 0.88,
        };
    }
    return {
        weight:      hovered ? 2.5 : 1.2,
        color:       hovered ? '#e8c97a' : 'rgba(201,168,76,0.45)',
        fillColor:   hovered ? lighten(base, 0.18) : base,
        fillOpacity: hovered ? 0.9 : 0.65
    };
}

function styleProvince(feature, hovered) {
    const pNum = getProvNum(feature);
    const base = PROV_COLORS[pNum] || '#7fb3c8';
    return {
        weight:      hovered ? 2.5 : 1.2,
        color:       hovered ? '#e8c97a' : 'rgba(201,168,76,0.45)',
        fillColor:   hovered ? lighten(base, 0.18) : base,
        fillOpacity: hovered ? 0.9 : 0.65
    };
}

// ── Province layer ──
const provinceGeoLayer = L.geoJson(provinceData, {
    style: f => styleProvince(f, false),
    onEachFeature(feature, layer) {
        const pNum = getProvNum(feature);
        layer.bindTooltip(PROV_NAMES[pNum] || `Province ${pNum}`, {
            permanent: false, direction: 'center', sticky: false
        });
        layer.on({
            mouseover(e) { e.target.setStyle(styleProvince(feature, true)); e.target.bringToFront(); },
            mouseout(e)  { e.target.setStyle(styleProvince(feature, false)); },
            click(e) {
                const p = getProvNum(e.target.feature);
                showSingleProvince(p, e.target.getBounds());
            }
        });
    }
});

provinceGeoLayer.addTo(provinceLayerGroup);
map.fitBounds(provinceGeoLayer.getBounds(), { padding: [20, 20] });

// ── Show single province ──
function showSingleProvince(pNum, bounds) {
    currentView = 'single';
    activeProvinceNum = pNum;
    updateButtonStates();

    if (map.hasLayer(provinceLayerGroup)) map.removeLayer(provinceLayerGroup);

    districtLayerGroup.clearLayers();
    currentDistrictEntries = [];

    drawProvince(pNum);

    if (bounds) map.fitBounds(bounds, { padding: [40, 40] });

    buildSidebar(pNum);
    updateStats();
}

// ── Draw province districts ──
function drawProvince(pNum) {
    const json = PROV_DATA[pNum]();
    if (!json) return;

    const geoLayer = L.geoJson(json, {
        style: f => styleDistrict(f, false),
        onEachFeature(feature, layer) {
            const name = dName(feature);
            layer.bindTooltip(name, { permanent: false, direction: 'center', sticky: false });
            layer.on({
                mouseover(e) { e.target.setStyle(styleDistrict(feature, true)); e.target.bringToFront(); },
                mouseout(e)  { e.target.setStyle(styleDistrict(feature, false)); },
                click()      { toggleVisited(name, layer, feature); }
            });
            if (name) {
                currentDistrictEntries.push({ name, layer, provinceNum: pNum });
            }
        }
    });

    geoLayer.addTo(districtLayerGroup);
}

// ── Show all districts ──
function showAllDistricts() {
    currentView = 'all-districts';
    activeProvinceNum = null;
    updateButtonStates();

    if (map.hasLayer(provinceLayerGroup)) map.removeLayer(provinceLayerGroup);

    districtLayerGroup.clearLayers();
    currentDistrictEntries = [];

    for (let p = 1; p <= 7; p++) drawProvince(p);

    map.fitBounds(provinceGeoLayer.getBounds(), { padding: [20, 20] });
    buildSidebar('all');
    updateStats();
}

// ── Province overview ──
function goToProvinceView() {
    currentView = 'provinces';
    activeProvinceNum = null;
    updateButtonStates();

    districtLayerGroup.clearLayers();
    currentDistrictEntries = [];

    if (!map.hasLayer(provinceLayerGroup)) provinceLayerGroup.addTo(map);

    map.fitBounds(provinceGeoLayer.getBounds(), { padding: [20, 20] });

    document.getElementById('district-list').innerHTML = `
        <div style="padding:24px 10px;color:var(--muted);font-size:0.76rem;text-align:center;line-height:1.8">
            Click a province on the map<br>or use the buttons above
        </div>`;
    updateButtonStates();
}

function updateButtonStates() {
    document.getElementById('provinces-btn').classList.toggle('active', currentView === 'provinces');
    document.getElementById('districts-btn').classList.toggle('active', currentView === 'all-districts');
}

// ── Toggle visited ──
function toggleVisited(name, layer, feature) {
    if (!name) return;
    if (visited.has(name)) {
        visited.delete(name);
        showToast(`<span class="tn">${name}</span> removed`);
    } else {
        visited.add(name);
        showToast(`✓ <span class="tn">${name}</span> visited!`);
    }
    saveVisited();
    if (layer && feature) layer.setStyle(styleDistrict(feature, false));
    updateStats();
    buildSidebar(activeFilter);
}

function toggleFromSidebar(name) {
    const entry = currentDistrictEntries.find(d => d.name === name);
    if (entry) {
        toggleVisited(name, entry.layer, entry.layer.feature);
    } else {
        if (visited.has(name)) { visited.delete(name); showToast(`<span class="tn">${name}</span> removed`); }
        else                   { visited.add(name);    showToast(`✓ <span class="tn">${name}</span> visited!`); }
        saveVisited();
        updateStats();
        buildSidebar(activeFilter);
    }
}

// ── Sidebar ──
function buildSidebar(filter) {
    activeFilter = filter;

    document.querySelectorAll('.prov-tab').forEach(t => {
        t.classList.toggle('active', String(t.dataset.p) === String(filter));
    });

    const byProvince = {};
    for (let p = 1; p <= 7; p++) byProvince[p] = [];
    const seen = new Set();
    currentDistrictEntries.forEach(({ name, provinceNum }) => {
        if (seen.has(name)) return;
        seen.add(name);
        if (byProvince[provinceNum]) byProvince[provinceNum].push(name);
    });
    for (let p = 1; p <= 7; p++) byProvince[p].sort((a, b) => a.localeCompare(b, 'ne'));

    const provinces = (filter === 'all') ? [1,2,3,4,5,6,7] : [parseInt(filter)];
    let html = '';

    provinces.forEach(p => {
        const names = byProvince[p];
        if (!names.length) return;
        const vc = names.filter(n => visited.has(n)).length;
        html += `<div class="prov-group-header" id="pg-${p}">
            <div class="gh-dot" style="background:${PROV_COLORS[p]}"></div>
            ${PROV_NAMES[p]}
            <span class="gh-count">${vc}/${names.length}</span>
        </div>`;
        names.forEach(name => {
            const isV = visited.has(name);
            html += `<div class="district-item ${isV ? 'vis-item' : ''}" id="di-${cssId(name)}" onclick="toggleFromSidebar('${esc(name)}')">
                <div class="district-dot ${isV ? 'vis' : 'unvisited'}"></div>
                <span class="district-name">${name}</span>
                <span class="district-check">✓</span>
            </div>`;
        });
    });

    if (!html) {
        html = `<div style="padding:24px 10px;color:var(--muted);font-size:0.76rem;text-align:center;line-height:1.8">
            Click a province on the map<br>or use the buttons above
        </div>`;
    }

    document.getElementById('district-list').innerHTML = html;
}

function filterProvince(p) {
    if (currentView === 'single' && p !== 'all' && parseInt(p) !== activeProvinceNum) {
        showSingleProvince(parseInt(p), null);
        return;
    }
    buildSidebar(p);
}

// ── Stats ──
function updateStats() {
    const c = visited.size;
    document.getElementById('visited-count').textContent = c;
    const pct = Math.round((c / 77) * 100);
    document.getElementById('pct-label').textContent = pct + '%';
    document.getElementById('prog-fill').style.width = pct + '%';
}

// ── Toast ──
let toastTimer;
function showToast(html) {
    const el = document.getElementById('toast');
    el.innerHTML = html;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function cssId(s) { return s.replace(/[^a-z0-9]/gi, '_'); }
function esc(s)   { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── Init ──
updateStats();
</script>
</body>
</html>
